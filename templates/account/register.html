<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MockAI – Create Account</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ["Syne", "sans-serif"],
            body: ["DM Sans", "sans-serif"],
          },
          animation: {
            'float':       'float 10s ease-in-out infinite',
            'float-r':     'float 12s ease-in-out infinite reverse',
            'float-slow':  'float 15s ease-in-out 3s infinite',
            'pulse-glow':  'pulseGlow 3.5s ease-in-out infinite',
            'fade-up':     'fadeUp 0.7s cubic-bezier(0.22,1,0.36,1) forwards',
            'back-slide':  'backSlide 0.55s cubic-bezier(0.22,1,0.36,1) 0.12s both',
          },
          keyframes: {
            float:      { '0%,100%':{ transform:'translateY(0px)' }, '50%':{ transform:'translateY(-22px)' } },
            pulseGlow:  { '0%,100%':{ boxShadow:'0 0 14px rgba(99,102,241,0.35)' }, '50%':{ boxShadow:'0 0 36px rgba(139,92,246,0.65)' } },
            fadeUp:     { '0%':{ opacity:0, transform:'translateY(28px)' }, '100%':{ opacity:1, transform:'translateY(0)' } },
            backSlide:  { '0%':{ opacity:0, transform:'translateX(-18px)' }, '60%':{ opacity:1, transform:'translateX(3px)' }, '100%':{ opacity:1, transform:'translateX(0)' } },
          }
        }
      }
    }
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; }

    /* ── Background ── */
    .bg-scene {
      background-color: #06070f;
      background-image:
        radial-gradient(ellipse 75% 60% at 10% 8%,  rgba(79,70,229,.26) 0%, transparent 55%),
        radial-gradient(ellipse 60% 55% at 88% 88%, rgba(124,58,237,.20) 0%, transparent 55%),
        radial-gradient(ellipse 45% 40% at 52% 48%, rgba(37,99,235,.07) 0%, transparent 60%);
    }
    .dot-grid {
      background-image: radial-gradient(rgba(99,102,241,.15) 1px, transparent 1px);
      background-size: 28px 28px;
    }

    /* ── Card ── */
    .card {
      background: rgba(10,10,24,.82);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 1px solid rgba(99,102,241,.2);
      box-shadow: 0 25px 80px rgba(0,0,0,.55), 0 0 0 1px rgba(99,102,241,.06) inset;
    }

    /* ── Gradient text ── */
    .g-text {
      background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 52%, #c084fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── Section divider ── */
    .divider-line { height: 1px; background: linear-gradient(90deg, transparent, rgba(99,102,241,.3), transparent); }

    /* ── Field labels ── */
    .field-label {
      display: block;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: rgba(148,163,184,.6);
      margin-bottom: 5px;
    }

    /* ── Input wrapper ── */
    .field-wrap { position: relative; }
    .field-icon {
      position: absolute;
      left: 13px; top: 50%; transform: translateY(-50%);
      color: rgba(148,163,184,.4);
      pointer-events: none;
      transition: color .25s ease;
    }
    .field-wrap:focus-within .field-icon { color: #a78bfa; }

    /* ── Input element ── */
    .input-el {
      width: 100%;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.1);
      color: #e2e8f0;
      border-radius: .75rem;
      padding: 11px 42px 11px 38px;
      font-size: .875rem;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color .25s ease, background .25s ease, box-shadow .25s ease;
    }
    .input-el::placeholder { color: rgba(148,163,184,.38); }
    .input-el:focus {
      border-color: rgba(139,92,246,.65);
      background: rgba(99,102,241,.07);
      box-shadow: 0 0 0 3px rgba(99,102,241,.13);
    }
    .input-el.is-error {
      border-color: rgba(248,113,113,.55) !important;
      box-shadow: 0 0 0 3px rgba(248,113,113,.1) !important;
    }
    .input-el.is-success {
      border-color: rgba(52,211,153,.5) !important;
      box-shadow: 0 0 0 3px rgba(52,211,153,.1) !important;
    }

    /* ── Eye toggle ── */
    .eye-btn {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      color: rgba(148,163,184,.45);
      background: none; border: none; cursor: pointer; padding: 2px;
      line-height: 0;
      transition: color .2s ease;
    }
    .eye-btn:hover { color: #a78bfa; }

    /* ── Strength bars ── */
    .s-bar {
      flex: 1; height: 3px; border-radius: 99px;
      background: rgba(255,255,255,.08);
      overflow: hidden;
    }
    .s-bar-fill {
      height: 100%; width: 0%; border-radius: 99px;
      transition: width .35s ease, background .35s ease;
    }

    /* ── Primary button ── */
    .btn-primary {
      background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%);
      box-shadow: 0 4px 22px rgba(79,70,229,.38);
      border: none; cursor: pointer;
      transition: filter .3s ease, transform .3s cubic-bezier(.34,1.56,.64,1), box-shadow .3s ease;
    }
    .btn-primary:hover:not(:disabled) {
      filter: brightness(1.12);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(79,70,229,.54);
    }
    .btn-primary:active:not(:disabled) { transform: translateY(0) scale(.98); }
    .btn-primary:disabled { opacity: .75; cursor: not-allowed; }

    /* ── Social buttons ── */
    .btn-social {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.1);
      cursor: pointer;
      transition: background .25s ease, border-color .25s ease, transform .25s cubic-bezier(.34,1.56,.64,1);
    }
    .btn-social:hover {
      background: rgba(99,102,241,.1);
      border-color: rgba(99,102,241,.4);
      transform: translateY(-2px);
    }
    .btn-social:active { transform: translateY(0) scale(.97); }

    /* ── Terms checkbox ── */
    .custom-check { accent-color: #7c3aed; width: 14px; height: 14px; cursor: pointer; flex-shrink: 0; }

    /* ── Error banner ── */
    .error-banner {
      display: none;
      align-items: center; gap: 8px;
      padding: 9px 12px;
      border-radius: 10px;
      background: rgba(248,113,113,.08);
      border: 1px solid rgba(248,113,113,.2);
      font-size: 12px;
      color: #fca5a5;
    }
    .error-banner.show { display: flex; }

    /* ── Success overlay ── */
    .success-overlay {
      display: none;
      position: absolute; inset: 0;
      border-radius: 24px;
      background: rgba(10,10,24,.95);
      backdrop-filter: blur(8px);
      z-index: 20;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      animation: fadeUp .5s ease forwards;
    }
    .success-overlay.show { display: flex; }

    /* ── Animated back button ── */
    .back-btn {
      animation: backSlide .55s cubic-bezier(.22,1,.36,1) .12s both;
      text-decoration: none;
    }
    .back-pill {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 7px 14px 7px 10px; border-radius: 999px;
      border: 1px solid rgba(139,92,246,.18);
      background: rgba(255,255,255,.04);
      backdrop-filter: blur(14px);
      transition: all .3s cubic-bezier(.34,1.56,.64,1);
    }
    .back-btn:hover .back-pill {
      background: rgba(139,92,246,.12);
      border-color: rgba(139,92,246,.5);
      box-shadow: 0 0 18px rgba(139,92,246,.18);
      transform: translateY(-1px);
    }
    .back-icon {
      width: 24px; height: 24px; border-radius: 50%;
      background: rgba(139,92,246,.15);
      display: flex; align-items: center; justify-content: center;
      transition: background .3s ease, transform .35s cubic-bezier(.34,1.56,.64,1);
    }
    .back-btn:hover .back-icon { background: rgba(139,92,246,.35); transform: translateX(-3px); }
    .back-lbl { font-size: 11px; font-weight: 500; color: #94a3b8; transition: color .25s ease; white-space: nowrap; }
    .back-btn:hover .back-lbl { color: #c4b5fd; }

    /* ── Progress steps ── */
    .step-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: rgba(255,255,255,.12);
      transition: background .3s ease, transform .3s ease;
    }
    .step-dot.active {
      background: linear-gradient(135deg, #6366f1, #9333ea);
      transform: scale(1.3);
    }
    .step-dot.done { background: #22c55e; }

    /* ── Responsive helpers ── */
    @media (max-width: 380px) {
      .card { padding: 24px 20px !important; }
    }
  </style>
</head>

<body class="bg-scene min-h-screen flex items-center justify-center px-4 sm:px-6 py-10 text-white relative overflow-x-hidden">

  <!-- Dot grid -->
  <div class="absolute inset-0 dot-grid opacity-30 pointer-events-none" aria-hidden="true"></div>

  <!-- Ambient orbs -->
  <div class="absolute w-72 sm:w-[420px] h-72 sm:h-[420px] rounded-full bg-indigo-600/15 blur-3xl top-[-80px] sm:top-[-110px] left-[-80px] sm:left-[-110px] animate-float pointer-events-none" aria-hidden="true"></div>
  <div class="absolute w-60 sm:w-[360px] h-60 sm:h-[360px] rounded-full bg-purple-600/15 blur-3xl bottom-[-70px] sm:bottom-[-90px] right-[-70px] sm:right-[-90px] animate-float-r pointer-events-none" aria-hidden="true"></div>
  <div class="absolute w-40 h-40 rounded-full bg-blue-600/8 blur-3xl top-[40%] right-[3%] animate-float-slow pointer-events-none hidden md:block" aria-hidden="true"></div>

  <!-- Decorative shapes (desktop only) -->
  <div class="absolute top-14 right-[10%] w-11 h-11 rounded-xl border border-indigo-500/20 bg-indigo-500/5 backdrop-blur hidden lg:flex items-center justify-center animate-float" style="animation-delay:1.8s" aria-hidden="true">
    <svg class="w-5 h-5 text-indigo-400 opacity-60" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
      <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z"/>
    </svg>
  </div>
  <div class="absolute bottom-20 left-[8%] w-9 h-9 rounded-lg border border-purple-500/20 bg-purple-500/5 backdrop-blur hidden lg:flex items-center justify-center animate-float-r" style="animation-delay:2.5s" aria-hidden="true">
    <svg class="w-4 h-4 text-purple-400 opacity-60" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 13.5l10.5-11.25L12 10.5h8.25L9.75 21.75 12 13.5H3.75z"/>
    </svg>
  </div>

  <!-- Back button -->
  <a href="/" class="back-btn fixed top-4 left-4 sm:top-5 sm:left-5 z-30">
    <div class="back-pill">
      <div class="back-icon">
        <svg class="w-3.5 h-3.5 text-indigo-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"/>
        </svg>
      </div>
      <span class="back-lbl hidden sm:inline">Back to Home</span>
    </div>
  </a>

  <!-- ══════════════════════════════════════
       REGISTER CARD
  ══════════════════════════════════════ -->
  <div class="card relative w-full max-w-md rounded-3xl p-7 sm:p-9 animate-fade-up z-10 mt-10 sm:mt-0">

    <!-- Success overlay -->
    <div id="success-overlay" class="success-overlay rounded-3xl">
      <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-emerald-500 to-teal-500 flex items-center justify-center shadow-lg shadow-emerald-500/30">
        <svg class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/>
        </svg>
      </div>
      <div class="text-center px-6">
        <h3 class="font-display font-700 text-xl text-white mb-1">Account Created!</h3>
        <p class="text-gray-400 text-sm">Welcome to MockAI. Redirecting you…</p>
      </div>
      <div class="w-8 h-8 border-2 border-indigo-400 border-t-transparent rounded-full animate-spin"></div>
    </div>

    <!-- ── Header ── -->
    <div class="flex items-center justify-between mb-7">
      <!-- Logo -->
      <div class="flex items-center gap-2.5">
        <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg shadow-indigo-500/35 animate-pulse-glow flex-shrink-0">
          <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z"/>
          </svg>
        </div>
        <span class="font-display font-800 text-xl tracking-tight">Mock<span class="g-text">AI</span></span>
      </div>

      <!-- Step dots -->
      <div class="flex items-center gap-1.5" id="step-dots" aria-label="Progress">
        <div class="step-dot done" title="Step 1"></div>
        <div class="step-dot active" title="Step 2"></div>
        <div class="step-dot" title="Step 3"></div>
      </div>
    </div>

    <!-- Title -->
    <div class="mb-6">
      <h1 class="font-display font-800 text-2xl sm:text-3xl text-white tracking-tight leading-tight mb-1.5">Create Account</h1>
      <p class="text-gray-400 text-sm leading-relaxed">Start your AI-powered interview journey today</p>
    </div>

    <!-- ── FORM ── -->
    <form id="register-form" class="space-y-4" onsubmit="return handleSubmit(event)" novalidate>

      <!-- Full Name -->
      <div>
        <label class="field-label" for="fullname">Full Name</label>
        <div class="field-wrap">
          <span class="field-icon">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/>
            </svg>
          </span>
          <input id="fullname" name="fullname" type="text" placeholder="e.g. Raj Ansari"
            class="input-el" autocomplete="name" inputmode="text"/>
        </div>
      </div>

      <!-- Email -->
      <div>
        <label class="field-label" for="email">Email Address</label>
        <div class="field-wrap">
          <span class="field-icon">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/>
            </svg>
          </span>
          <input id="email" name="email" type="email" placeholder="you@example.com"
            class="input-el" autocomplete="email" inputmode="email"/>
        </div>
      </div>

      <!-- Password -->
      <div>
        <label class="field-label" for="password">Password</label>
        <div class="field-wrap">
          <span class="field-icon">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/>
            </svg>
          </span>
          <input id="password" name="password" type="password" placeholder="Min. 8 characters"
            class="input-el" autocomplete="new-password" oninput="checkStrength(this.value)"/>
          <button type="button" class="eye-btn" onclick="togglePw('password','eye1o','eye1c')" aria-label="Toggle password">
            <svg id="eye1o" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            </svg>
            <svg id="eye1c" class="w-4 h-4 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88"/>
            </svg>
          </button>
        </div>
        <!-- Strength meter -->
        <div class="flex gap-1.5 mt-2">
          <div class="s-bar"><div id="bar1" class="s-bar-fill"></div></div>
          <div class="s-bar"><div id="bar2" class="s-bar-fill"></div></div>
          <div class="s-bar"><div id="bar3" class="s-bar-fill"></div></div>
          <div class="s-bar"><div id="bar4" class="s-bar-fill"></div></div>
        </div>
        <p id="strength-label" class="text-[10px] mt-1 h-3 transition-all"></p>
      </div>

      <!-- Confirm Password -->
      <div>
        <label class="field-label" for="confirmPassword">Confirm Password</label>
        <div class="field-wrap">
          <span class="field-icon">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z"/>
            </svg>
          </span>
          <input id="confirmPassword" name="confirmPassword" type="password" placeholder="Re-enter password"
            class="input-el" autocomplete="new-password" oninput="checkMatch()"/>
          <button type="button" class="eye-btn" onclick="togglePw('confirmPassword','eye2o','eye2c')" aria-label="Toggle confirm password">
            <svg id="eye2o" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            </svg>
            <svg id="eye2c" class="w-4 h-4 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88"/>
            </svg>
          </button>
        </div>
        <p id="match-msg" class="text-[11px] mt-1.5 h-4 transition-all"></p>
      </div>

      <!-- Terms -->
      <label class="flex items-start gap-3 cursor-pointer group select-none mt-1" for="terms">
        <input id="terms" name="terms" type="checkbox" class="custom-check mt-0.5"/>
        <span class="text-xs text-gray-400 leading-relaxed group-hover:text-gray-300 transition-colors">
          I agree to the
          <a href="#" class="text-indigo-400 hover:text-indigo-300 transition-colors underline-offset-2 hover:underline">Terms of Service</a>
          and
          <a href="#" class="text-indigo-400 hover:text-indigo-300 transition-colors underline-offset-2 hover:underline">Privacy Policy</a>
        </span>
      </label>

      <!-- Error banner -->
      <div id="form-error" class="error-banner" role="alert">

  <script>
    /* ── Eye toggle ── */
    function togglePw(inputId, openId, closeId) {
      const inp = document.getElementById(inputId);
      const isHidden = inp.type === 'password';
      inp.type = isHidden ? 'text' : 'password';
      document.getElementById(openId).classList.toggle('hidden', isHidden);
      document.getElementById(closeId).classList.toggle('hidden', !isHidden);
    }

    /* ── Password strength ── */
    const S_COLORS = ['#ef4444', '#f97316', '#eab308', '#22c55e'];
    const S_LABELS = ['Weak', 'Fair', 'Good', 'Strong'];

    function checkStrength(val) {
      let score = 0;
      if (val.length >= 8) score++;
      if (/[A-Z]/.test(val) && /[a-z]/.test(val)) score++;
      if (/\d/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;

      for (let i = 1; i <= 4; i++) {
        const fill = document.getElementById('bar' + i);
        fill.style.width      = i <= score ? '100%' : '0%';
        fill.style.background = i <= score ? S_COLORS[score - 1] : 'transparent';
      }
      const lbl = document.getElementById('strength-label');
      if (val.length) {
        lbl.textContent = 'Strength: ' + (S_LABELS[score - 1] || 'Too short');
        lbl.style.color = S_COLORS[Math.max(0, score - 1)];
      } else {
        lbl.textContent = '';
      }
      checkMatch();
    }

    /* ── Password match check ── */
    function checkMatch() {
      const pw   = document.getElementById('password').value;
      const cpw  = document.getElementById('confirmPassword').value;
      const msg  = document.getElementById('match-msg');
      const conf = document.getElementById('confirmPassword');

      conf.classList.remove('is-error', 'is-success');
      if (!cpw) { msg.textContent = ''; return; }

      if (pw === cpw) {
        msg.textContent = '✓ Passwords match';
        msg.style.color = '#4ade80';
        conf.classList.add('is-success');
      } else {
        msg.textContent = '✗ Passwords do not match';
        msg.style.color = '#f87171';
        conf.classList.add('is-error');
      }
    }

    /* ── Form submission ── */
    function handleSubmit(e) {
      e.preventDefault();

      const errEl   = document.getElementById('form-error');
      const errText = document.getElementById('error-text');
      const btn     = document.getElementById('submit-btn');

      const name  = document.getElementById('fullname').value.trim();
      const email = document.getElementById('email').value.trim();
      const pw    = document.getElementById('password').value;
      const cpw   = document.getElementById('confirmPassword').value;
      const terms = document.getElementById('terms').checked;

      // Hide error
      errEl.classList.remove('show');

      const showErr = (msg) => {
        errText.textContent = msg;
        errEl.classList.add('show');
        errEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      };

      // Validate
      if (!name)              return showErr('Please enter your full name.');
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email))
                              return showErr('Please enter a valid email address.');
      if (pw.length < 8)      return showErr('Password must be at least 8 characters.');
      if (pw !== cpw)         return showErr('Passwords do not match. Please re-enter.');
      if (!terms)             return showErr('Please accept the Terms of Service to continue.');

      // Loading state
      btn.disabled = true;
      btn.innerHTML = `
        <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
        </svg>
        Creating account…`;

      // Simulate async → show success overlay
      setTimeout(() => {
        document.getElementById('success-overlay').classList.add('show');
      }, 1400);

      return false;
    }
  </script>
